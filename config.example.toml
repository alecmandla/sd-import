# sd-photo-import configuration
#
# Copy this file to ~/.config/sd-photo-import/config.toml (install.sh does
# this for you) and edit to taste. Any keys you omit fall back to the
# defaults below.

[paths]
# Where imported photos go. Year and month folders are created inside this.
# Tip: point this at a cloud-synced folder (Google Drive, iCloud Drive,
# Dropbox) and you get automatic offsite backup.
destination = "~/Pictures"

[behavior]
# Eject the SD card after a successful import.
eject_when_done = true

# Month folder name. Available placeholders:
#   {month_num}    -> 5
#   {month_num:02d}-> 05
#   {month_name}   -> May
#   {year}         -> 2026
# Examples: "{month_num:02d}-{month_name}" -> "05-May"
#           "{month_num:02d}"              -> "05"
#           "{year}-{month_num:02d}"       -> "2026-05"
month_folder_format = "{month_num:02d}-{month_name}"

# Subfolder inside each month folder for RAW files. Set to "" to keep RAW
# files alongside JPEGs.
raw_subfolder = "RAW"

[filetypes]
jpeg  = [".jpg", ".jpeg"]
raw   = [".cr2", ".cr3", ".nef", ".arw", ".raf", ".rw2", ".orf", ".dng", ".pef", ".srw"]
video = [".mp4", ".mov", ".avi", ".m4v"]
